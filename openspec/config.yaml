schema: spec-driven

context: |
  项目：实时视频分析监测系统（智慧自习室 AI 管家）
  版本：MVP V1.0.0
  简介：面向共享自习室的智能管理平台，通过视频流、CV 算法、可视化看板和第三方通知，
        将被动监控升级为主动感知、及时告警、闭环处置。

  技术栈：
    - 端：IP 摄像头，采集 H.264/AAC 音视频流
    - 流：Nginx-RTMP 推拉流转发
    - 云：Python Flask + OpenCV + YOLOv8n + Dlib
    - 网：Vue 3 + Element Plus
    - 部署：Docker + Jenkins CI/CD

  约定：
    - 规范驱动：先创建 changes/<change-id> 并明确 capability delta，再编写代码
    - 每个能力对应一份 specs/<capability>/spec.md，变更统一走 changes/ 提案流程
    - 功能状态以根目录 feature_list.json 为唯一事实来源
    - 会话流程见根目录 AGENTS.md
    - 提交信息使用 conventional commits（feat/fix/perf/ci/docs/refactor）

  目录索引：
    - project.md — 项目上下文与 OpenSpec 工作流
    - specs/spec.md — 能力索引
    - specs/<capability>/spec.md — 已接受的能力契约（真理源）
    - specs/系统设计说明书.md — 系统设计说明书（SDD）
    - specs/数据库设计.md — 数据库设计
    - changes/ — 活动变更与归档
    - proposals/ — 历史参考，不再新建提案
    - tasks/ — 六人任务书与协作顺序
    - progress/ — 会话进度与工作记录

rules:
  proposal:
    - 中文撰写，保持简洁
    - 必须包含「变更摘要」「动机」「方案」「影响范围」四部分
  tasks:
    - 每个任务拆分到可独立验证的粒度
    - 标注预计耗时和依赖关系
  implementation:
    - 新模块或跨模块变更必须先有有效的 OpenSpec change
    - 代码实现前和归档前必须通过 openspec validate --all --strict
