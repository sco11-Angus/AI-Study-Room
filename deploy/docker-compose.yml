# 部署编排 — 低配 Linux 云服务器 2核/2GB/4Mbps (系统设计说明书 §11)
# 流分发与算法后端进程解耦，控制 CPU < 40%
services:
  nginx-rtmp:
    image: tiangolo/nginx-rtmp
    ports:
      - "9090:9090"   # RTMP 推拉流
      - "8080:8080"   # HTTP-FLV / 前端静态 / 流状态
    volumes:
      - ../streaming/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../frontend/dist:/usr/share/nginx/html:ro
      - /usr/local/rtmp_video:/usr/local/rtmp_video
    restart: unless-stopped

  backend:
    build: ../backend
    ports:
      - "5000:5000"   # API + WebSocket + Swagger(/apidocs)
    environment:
      - SKIP_N=5
      - RTMP_SERVER=nginx-rtmp
      - RTMP_PORT=9090
      - FIRE_WINDOW=30
      - FIRE_CONF=0.45
      - ESCALATE_TIMEOUT=180
      - DINGTALK_WEBHOOK=${DINGTALK_WEBHOOK}
      - DATABASE_URI=sqlite:///study_room.db
    volumes:
      - ../backend/snapshots:/app/snapshots
      - ../backend/model_weights:/app/model_weights
    depends_on:
      - nginx-rtmp
    restart: unless-stopped
