# 部署编排 — 直接连接云服务器 RTMP 流
services:
  backend:
    build: ../backend
    ports:
      - "5000:5000"   # API + WebSocket + Swagger(/apidocs)
    environment:
      - SKIP_N=5
      - RTMP_SERVER=49.233.71.82
      - RTMP_PORT=9090
      - FIRE_WINDOW=30
      - FIRE_CONF=0.45
      - ESCALATE_TIMEOUT=180
      - DINGTALK_WEBHOOK=${DINGTALK_WEBHOOK}
      - DATABASE_URI=sqlite:///study_room.db
    volumes:
      - ../backend/snapshots:/app/snapshots
      - ../backend/model_weights:/app/model_weights
    restart: unless-stopped