# Nginx-RTMP 配置 — 流媒体服务器（流，系统设计说明书 §2, §11）
# :1935 接收摄像头 RTMP 推流；:8080 对前端提供 HTTP-FLV 低延迟播放 (§3.3)

worker_processes auto;
events { worker_connections 1024; }

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application live {
            live on;
            # 低延迟：不做 GOP 缓存
            gop_cache off;
            # 允许后端 Flask 拉流做 AI 分析
            allow play all;

            # 视频录制存储（自动按流名+时间戳命名）
            record all;
            record_path /usr/local/rtmp_video;
            record_unique on;
            record_suffix _%Y-%m-%d-%H-%M-%S.flv;
        }
    }
}

http {
    server {
        listen 8080;

        # HTTP-FLV 播放地址：http://host:8080/live?port=1935&app=live&stream=cam1
        location /live {
            flv_live on;
            chunked_transfer_encoding on;
            add_header Access-Control-Allow-Origin *;
        }

        # RTMP 流状态监控（JSON）
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
            allow all;
        }

        # 前端静态资源托管 (§11)
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }
    }
}
