# Nginx-RTMP 配置 — 低延迟版
user ubuntu;
worker_processes auto;
error_log logs/error.log;

events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 9090;
        chunk_size 4096;

        application live {
            live on;
            allow play all;
            gop_cache off;          # 降延迟

            record all;
            record_path /usr/local/rtmp_video;
            record_unique on;
            record_suffix _%Y-%m-%d-%H-%M-%S.flv;
        }
    }
}

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile off;
    tcp_nodelay on;
    keepalive_timeout 15;

    # 9091：HTTP 测试页
    server {
        listen 9091;
        server_name localhost;

        location / {
            root html;
            index index.html index.htm;
        }
    }

    # 9092：视频文件浏览
    server {
        listen 9092;
        server_name localhost;

        location / {
            root /usr/local/rtmp_video;
            autoindex on;
            autoindex_exact_size off;
            autoindex_localtime on;
            charset utf-8;
        }
    }

    # 8080：HTTP-FLV / 流状态 / 前端
    server {
        listen 8080;

        # HTTP-FLV 直播（前端播放）
        location /live {
            flv_live on;
            chunked_transfer_encoding on;
            add_header 'Access-Control-Allow-Origin' '*';
        }

        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }

        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }
    }
}
